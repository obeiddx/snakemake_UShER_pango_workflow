# ---------------------------------------------------------------------------
# Config for Snakefile_pango_stem  (per-Pango-lineage STEM-branch mutations)
# ---------------------------------------------------------------------------

# Which MAT key to build (must exist in mat_trees below).
current_mat: public_latest

# Output subdirectory under results_{mat}/
pango_stem_dir: pango_stem

# Pango lineages to extract stem branches for.
#   - Leave empty ([]) to auto-select EVERY clade in the tree whose name looks
#     like a Pango lineage (recommended for "do it for all clades in Pango").
#   - Or pin a list to restrict, e.g. [BA.1, BA.2, BA.5, XBB.1.5, JN.1]
pango_clades: []

# ---------------------------------------------------------------------------
# Pre-built dual-annotated (nextclade + pangolin) MAT protobuf(s).
# Pango annotations live on internal nodes of the *.nextclade.pangolin.pb.gz
# files. Pin a dated snapshot for reproducibility rather than 'latest'.
# ---------------------------------------------------------------------------
mat_trees:
  public_latest: "https://hgwdev.gi.ucsc.edu/~angie/7867c81/gisaidAndPublic.2026-04-08.masked.pb.gz"

# Reference genome (Wuhan-Hu-1 / NC_045512v2), gzip-served.
ref_fasta: "http://hgdownload.soe.ucsc.edu/goldenPath/wuhCor1/bigZips/wuhCor1.fa.gz"

# Reference gene annotation (GTF). The stock ncbiGenes.gtf gives ORF1ab/ORF1a/
# ORF1b coordinates. To get nsp-level AA calls, add nsp CDS features via the
# add_to_ref_gtf edits below (consumed by scripts/1_ref_gtf_minimal.R).
ref_gtf: "http://hgdownload.soe.ucsc.edu/goldenPath/wuhCor1/bigZips/genes/ncbiGenes.gtf.gz"

# GTF edits applied by scripts/1_ref_gtf_minimal.R (same mechanism as the main
# pipeline). Put your nsp CDS feature definitions here to resolve the
# ORF1a/ORF1b-vs-nsp namespace. Structure must match what your R script expects.
add_to_ref_gtf: {}
